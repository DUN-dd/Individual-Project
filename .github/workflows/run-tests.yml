name: Run Unit Tests

on:
  push:
    branches:
      - main
      - 'claude/**'

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"
  GODOT_VERSION_FULL: "4.6.1-stable"

jobs:
  unit-tests:
    name: Run Unit Tests
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Godot data
        id: cache-import
        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION_FULL }}-${{ hashFiles('1.Codebase/**/*.gd', '1.Codebase/**/*.import') }}
          restore-keys: |
            godot-${{ runner.os }}-${{ env.GODOT_VERSION_FULL }}-

      - name: Setup Godot
        uses: ./.github/actions/setup-godot
        with:
          godot-version: ${{ env.GODOT_VERSION }}
          godot-version-full: ${{ env.GODOT_VERSION_FULL }}

      - name: Import project assets
        run: |
          echo "Importing project assets for headless mode..."
          timeout 60 ./godot_executable --headless --editor --quit --path . 2>&1 || true
          echo "Import complete"

      - name: Commit generated .import files
        if: github.event_name == 'push'
        run: |
          echo "Checking for newly generated .import files..."
          mapfile -t IMPORT_FILES < <(git ls-files --others --ignored --exclude-standard -- '1.Codebase/**/*.import')

          if [ ${#IMPORT_FILES[@]} -eq 0 ]; then
            echo "No new .import files detected."
            exit 0
          fi

          printf "Found %d .import files to add:\n" "${#IMPORT_FILES[@]}"
          printf ' - %s\n' "${IMPORT_FILES[@]}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f "${IMPORT_FILES[@]}"

          if git diff --cached --quiet; then
            echo "No staged changes after adding .import files."
            exit 0
          fi

          git commit -m "chore: add generated import metadata"
          git push origin HEAD

      - name: Create test output directory
        run: mkdir -p test-results

      - name: Run all unit tests
        id: run-tests
        run: |
          echo "Running all unit tests..."
          echo "============================================"

          timeout 120 ./godot_executable --headless --path . res://1.Codebase/src/scenes/tests/all_tests_runner.tscn 2>&1 | tee test-results/test-output.log || true

          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "test_exit_code=$TEST_EXIT_CODE" >> $GITHUB_OUTPUT

          echo ""
          echo "============================================"
          echo "Test execution completed with exit code: $TEST_EXIT_CODE"
        continue-on-error: true

      - name: Parse test results
        id: parse-results
        run: |
          echo "Parsing test results..."

          OUTPUT_FILE="test-results/test-output.log"
          SUMMARY_FILE="test-results/summary.md"

          echo "# 🧪 Test Results Summary" > $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $SUMMARY_FILE
          echo "**Commit:** \`${{ github.sha }}\`" >> $SUMMARY_FILE
          echo "**Triggered by:** ${{ github.actor }}" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE

          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "❌ Test output file not found!" >> $SUMMARY_FILE
            echo "test_status=error" >> $GITHUB_OUTPUT
            exit 1
          fi

          TOTAL_TESTS=$(grep "✅ PASS\|❌ FAIL" "$OUTPUT_FILE" 2>/dev/null | wc -l | tr -d ' ')
          PASSED_TESTS=$(grep "✅ PASS" "$OUTPUT_FILE" 2>/dev/null | wc -l | tr -d ' ')
          FAILED_TESTS=$(grep "❌ FAIL" "$OUTPUT_FILE" 2>/dev/null | wc -l | tr -d ' ')

          TOTAL_TESTS=${TOTAL_TESTS:-0}
          PASSED_TESTS=${PASSED_TESTS:-0}
          FAILED_TESTS=${FAILED_TESTS:-0}

          if grep -q "TEST SUMMARY" "$OUTPUT_FILE"; then
            echo "## Test Statistics" >> $SUMMARY_FILE
            echo "" >> $SUMMARY_FILE
            echo "| Metric | Value |" >> $SUMMARY_FILE
            echo "|--------|-------|" >> $SUMMARY_FILE

            SUMMARY_TOTAL=$(grep "Total Tests:" "$OUTPUT_FILE" | grep -o '[0-9]*' | head -1 || echo "$TOTAL_TESTS")
            SUMMARY_PASSED=$(grep "✅ Passed:" "$OUTPUT_FILE" | grep -o '[0-9]*' | head -1 || echo "$PASSED_TESTS")
            SUMMARY_FAILED=$(grep "❌ Failed:" "$OUTPUT_FILE" | grep -o '[0-9]*' | head -1 || echo "$FAILED_TESTS")
            PASS_RATE=$(grep "Pass Rate:" "$OUTPUT_FILE" | grep -o '[0-9.]*%' | head -1 || echo "N/A")

            echo "| Total Tests | $SUMMARY_TOTAL |" >> $SUMMARY_FILE
            echo "| ✅ Passed | $SUMMARY_PASSED |" >> $SUMMARY_FILE
            echo "| ❌ Failed | $SUMMARY_FAILED |" >> $SUMMARY_FILE
            echo "| Pass Rate | $PASS_RATE |" >> $SUMMARY_FILE

            TOTAL_TESTS=$SUMMARY_TOTAL
            PASSED_TESTS=$SUMMARY_PASSED
            FAILED_TESTS=$SUMMARY_FAILED
          else
            echo "## Test Statistics" >> $SUMMARY_FILE
            echo "" >> $SUMMARY_FILE
            echo "| Metric | Value |" >> $SUMMARY_FILE
            echo "|--------|-------|" >> $SUMMARY_FILE
            echo "| Total Tests | $TOTAL_TESTS |" >> $SUMMARY_FILE
            echo "| ✅ Passed | $PASSED_TESTS |" >> $SUMMARY_FILE
            echo "| ❌ Failed | $FAILED_TESTS |" >> $SUMMARY_FILE

            if [ "$TOTAL_TESTS" -gt 0 ]; then
              PASS_RATE=$(awk "BEGIN {printf \"%.1f%%\", ($PASSED_TESTS / $TOTAL_TESTS) * 100}")
              echo "| Pass Rate | $PASS_RATE |" >> $SUMMARY_FILE
            fi
          fi

          echo "" >> $SUMMARY_FILE

          echo "total_tests=$TOTAL_TESTS" >> $GITHUB_OUTPUT
          echo "passed_tests=$PASSED_TESTS" >> $GITHUB_OUTPUT
          echo "failed_tests=$FAILED_TESTS" >> $GITHUB_OUTPUT

          if [ "$FAILED_TESTS" -gt 0 ]; then
            echo "## ❌ Tests Failed" >> $SUMMARY_FILE
            echo "" >> $SUMMARY_FILE
            echo "The following tests failed:" >> $SUMMARY_FILE
            echo "" >> $SUMMARY_FILE
            echo '```' >> $SUMMARY_FILE
            grep "❌ FAIL" "$OUTPUT_FILE" | head -20 >> $SUMMARY_FILE || true
            echo '```' >> $SUMMARY_FILE
            echo "test_status=failure" >> $GITHUB_OUTPUT
          elif [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "## ⚠️ No Tests Found" >> $SUMMARY_FILE
            echo "" >> $SUMMARY_FILE
            echo "No test results were detected in the output." >> $SUMMARY_FILE
            echo "test_status=no_tests" >> $GITHUB_OUTPUT
          else
            echo "## ✅ All Tests Passed!" >> $SUMMARY_FILE
            echo "" >> $SUMMARY_FILE
            echo "🎉 All $PASSED_TESTS tests passed successfully!" >> $SUMMARY_FILE
            echo "test_status=success" >> $GITHUB_OUTPUT
          fi

          echo "" >> $SUMMARY_FILE
          echo "<details>" >> $SUMMARY_FILE
          echo "<summary>📋 View Full Test Output</summary>" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo '```' >> $SUMMARY_FILE
          cat "$OUTPUT_FILE" >> $SUMMARY_FILE
          echo '```' >> $SUMMARY_FILE
          echo "</details>" >> $SUMMARY_FILE

          cat $SUMMARY_FILE

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Add test summary to job
        if: always()
        run: |
          if [ -f "test-results/summary.md" ]; then
            cat test-results/summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment test results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'test-results/summary.md';

            if (!fs.existsSync(summaryPath)) {
              console.log('Summary file not found, skipping PR comment');
              return;
            }

            const summary = fs.readFileSync(summaryPath, 'utf8');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🧪 Test Results Summary')
            );

            const commentBody = summary + '\n\n---\n*Updated: ' + new Date().toUTCString() + '*';

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Check test status
        if: always()
        run: |
          TEST_STATUS="${{ steps.parse-results.outputs.test_status }}"

          echo "Final test status: $TEST_STATUS"

          if [ "$TEST_STATUS" = "failure" ]; then
            echo "❌ Tests failed!"
            exit 1
          elif [ "$TEST_STATUS" = "no_tests" ]; then
            echo "⚠️  No tests were found or executed!"
            exit 1
          elif [ "$TEST_STATUS" = "error" ]; then
            echo "❌ Error occurred during test execution!"
            exit 1
          else
            echo "✅ All tests passed!"
            exit 0
          fi

